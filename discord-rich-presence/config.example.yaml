# Discord Rich Presence Service Configuration
# نسخ هذا الملف إلى ~/.config/discord-rich-presence/config.yaml

# إعدادات Discord
discord:
  # معرف تطبيق Discord الخاص بك
  # احصل عليه من: https://discord.com/developers/applications
  client_id: "123456789"
  
  # أزرار (حتى 2)
  buttons:
    - label: "Website"
      url: "https://imedkablavi.info"
    - label: "GitHub"
      url: "https://github.com/imedkablavi"

# إعدادات الخصوصية
privacy:
  # وضع الخصوصية: off | balanced | strict
  # off: عرض كل التفاصيل
  # balanced: إخفاء المسارات الكاملة، عرض أسماء المشاريع والامتدادات فقط
  # strict: عرض أوصاف عامة فقط
  mode: balanced
  
  # أنماط regex للبيانات الحساسة
  redactions:
    - regex: '(?i)(password|token|secret|key|api[_-]?key)\S*'
    - regex: '([A-Fa-f0-9]{32,})'  # سلاسل hex طويلة
  
  # إخفاء مسارات المنزل (/home/user)
  hide_home_paths: true

# فترة التحديث بالثواني
update_interval_secs: 7

# أسماء الصور (يجب أن تطابق Art Assets في Discord)
images:
  browser: "browser"
  video: "video"
  terminal: "terminal"
  code: "code"
  app: "app"
  # خرائط أيقونات التطبيقات (يجب رفع Art Assets بهذه الأسماء)
  apps:
    explorer: "explorer"
    chrome: "chrome"
    edge: "edge"
    firefox: "firefox"
    brave: "brave"
    opera: "opera"
    vivaldi: "vivaldi"
    vscode: "vscode"
    code: "vscode"
    pycharm: "pycharm"
    trae: "trae"
    powershell: "powershell"
    cmd: "cmd"
  
  # أيقونات اللغات
  langs:
    python: "py"
    javascript: "js"
    typescript: "ts"
    cpp: "cpp"
    c: "c"
    java: "java"
    go: "go"
    rust: "rust"
    php: "php"
    ruby: "ruby"
    swift: "swift"
    kotlin: "kotlin"
    dart: "dart"
    html: "html"
    css: "css"
    json: "json"
    yaml: "yaml"
    markdown: "md"

# قواعد الكشف
rules:
  # نطاقات YouTube
  youtube_domains:
    - "YouTube"
    - "youtu.be"
  
  # علامات التصفح الخاص
  private_markers:
    - "Incognito"
    - "Private Browsing"
    - "InPrivate"
  
  # تفعيل/تعطيل الكاشفات
  enabled_detectors:
    media: true
    terminal: true
    coding: true
    browser: true
