# Discord Rich Presence Service Configuration
# Copy this file to ~/.config/discord-rich-presence/config.yaml

# Discord Settings
discord:
  # Your Discord Application ID
  # Required. Get it from: https://discord.com/developers/applications
  client_id: ""
  
  # Up to 2 buttons that will appear on your Discord profile.
  # Note: Buttons will be disabled when privacy mode is set to 'strict'.
  buttons:
    - label: "My Website"
      url: "https://example.com"
    - label: "GitHub"
      url: "https://github.com/example"

# Privacy Settings
privacy:
  # Privacy mode: off | balanced | strict
  # off: Display all context (filenames, full project names, URLs).
  # balanced: Hide full system paths and sensitive tokens, show file explicitly.
  # strict: Hide file names, directories, and URLs completely. Generalizations only.
  mode: balanced
  
  # Custom regex patterns for redaction
  redactions:
    - regex: '(?i)(password|token|secret|key|api[_-]?key)\S*'
    - regex: '([A-Fa-f0-9]{32,})'  # Long hex tokens
  
  # Hide your user directory (e.g. C:/Users/name -> ~)
  hide_home_paths: true

# How often presence is checked (in seconds)
update_interval_secs: 5

# Image Asset Mappings (Used via Discord Developer Portal)
# These strings must match the keys you uploaded in your Discord App.
images:
  browser: "browser"
  video: "video"
  terminal: "terminal"
  code: "code"
  app: "app"
  
  # Application-specific icon mapping
  apps:
    explorer: "explorer"
    chrome: "chrome"
    edge: "edge"
    firefox: "firefox"
    brave: "brave"
    vscode: "vscode"
    code: "vscode"
    pycharm: "pycharm"
    powershell: "powershell"
    cmd: "cmd"
  
  # Language Extension Mappings
  langs:
    python: "py"
    javascript: "js"
    typescript: "ts"
    cpp: "cpp"
    c: "c"
    java: "java"
    go: "go"
    rust: "rust"
    php: "php"
    ruby: "ruby"
    html: "html"
    css: "css"
    json: "json"
    yaml: "yaml"
    markdown: "md"

# Application Rules
rules:
  # Specific recognizable browser patterns
  youtube_domains:
    - "YouTube"
    - "youtu.be"
  
  # Patterns indicating Private / Incognito browsing
  private_markers:
    - "Incognito"
    - "Private Browsing"
    - "InPrivate"
  
  # Explicitly enable or disable detectors
  enabled_detectors:
    media: true
    terminal: true
    coding: true
    browser: true

# Manual Status Override
override:
  enabled: false
  details: "Custom Status"
  state: "Doing something cool"
  large_image_key: "app"
  large_text: "Custom Large Text"
  small_image_key: ""
  small_text: ""
  use_start_timestamp: true
