# Discord Rich Presence Service Configuration
# نسخ هذا الملف إلى ~/.config/discord-rich-presence/config.yaml

# إعدادات Discord
discord:
  # معرف تطبيق Discord اختياري
  # إذا تركته فارغًا سيتم استخدام App ID افتراضي تلقائيًا
  client_id: ""
  fallback_client_ids:
    - "1437867564762923028"
  
  # أزرار (حتى 2)
  buttons:
    - label: "Website"
      url: "https://imedkablavi.info"
    - label: "GitHub"
      url: "https://github.com/imedkablavi"

# إعدادات الخصوصية
privacy:
  # وضع الخصوصية: off | balanced | strict
  # off: عرض كل التفاصيل
  # balanced: إخفاء المسارات الكاملة، عرض أسماء المشاريع والامتدادات فقط
  # strict: عرض أوصاف عامة فقط
  mode: balanced
  
  # أنماط regex للبيانات الحساسة
  redactions:
    - regex: '(?i)(password|token|secret|key|api[_-]?key)\S*'
    - regex: '([A-Fa-f0-9]{32,})'  # سلاسل hex طويلة
  
  # إخفاء مسارات المنزل (/home/user)
  hide_home_paths: true

# فترة التحديث بالثواني (منخفضة لسرعة الاستجابة)
update_interval_secs: 2

# إعدادات النظام
system:
  # بدء التطبيق مصغرًا في علبة النظام
  start_minimized: false
  # تشغيل تلقائي مع بدء النظام (Windows: يستخدم السجل)
  auto_start: false

# إعدادات الواجهة (لوحة التحكم)
ui:
  appearance_mode: "System" # System | Light | Dark
  color_theme: "blue"       # blue | green | dark-blue

# أسماء الصور (يجب أن تطابق Art Assets في Discord)
images:
  browser: "browser"
  video: "video"
  terminal: "terminal"
  code: "code"
  app: "app"
  # خرائط أيقونات التطبيقات (يجب رفع Art Assets بهذه الأسماء)
  apps:
    explorer: "explorer"
    chrome: "chrome"
    edge: "edge"
    firefox: "firefox"
    brave: "brave"
    opera: "opera"
    vivaldi: "vivaldi"
    vscode: "vscode"
    code: "vscode"
    pycharm: "pycharm"
    trae: "trae"
    powershell: "powershell"
    cmd: "cmd"
  
  # أيقونات اللغات
  langs:
    python: "py"
    javascript: "js"
    typescript: "ts"
    cpp: "cpp"
    c: "c"
    java: "java"
    go: "go"
    rust: "rust"
    php: "php"
    ruby: "ruby"
    swift: "swift"
    kotlin: "kotlin"
    dart: "dart"
    html: "html"
    css: "css"
    json: "json"
    yaml: "yaml"
    markdown: "md"
  
  # أيقونات مشغلات الوسائط
  players:
    spotify: "spotify"
    vlc: "vlc"
    chrome: "chrome"
    edge: "edge"
    firefox: "firefox"
    mpv: "mpv"
  
  # أيقونات المواقع
  sites:
    youtube: "youtube"
    netflix: "netflix"
    hulu: "hulu"
    prime video: "prime"
  
  # أيقونات الألعاب
  games:
    league of legends: "lol"
    valorant: "valorant"
    minecraft: "minecraft"
    fortnite: "fortnite"
    apex legends: "apex"

# قواعد الكشف
rules:
  # نطاقات YouTube
  youtube_domains:
    - "YouTube"
    - "youtu.be"
  
  # علامات التصفح الخاص
  private_markers:
    - "Incognito"
    - "Private Browsing"
    - "InPrivate"
  
  # تفعيل/تعطيل الكاشفات
  enabled_detectors:
    media: true
    terminal: true
    coding: true
    browser: true
    # تعطيل كشف الألعاب افتراضياً (فعّله إذا كنت لاعباً)
    gaming: false
    # كاشفات المجتمع (Plugins)
    plugins: true
  
  # قائمة السماح (فارغة = السماح للكل)
  whitelist:
    apps: []
    sites: []
    games: []
  
  # قائمة الحظر
  blacklist:
    apps: []
    sites: []
    games: []

# نظام الإضافات (Community Plugins)
plugins:
  # اتركه فارغاً لاستخدام المسار الافتراضي:
  # ~/.config/discord-rich-presence/plugins (أو AppData على ويندوز)
  directory: ""
  # قائمة بيضاء لأسماء ملفات الإضافات (بدون .py)
  # [] = تحميل كل الإضافات
  enabled: []

# تجاوز يدوي للحالة (Override)
# فعّل هذا لتعيين حالة ثابتة وتجاهل الكشف التلقائي
override:
  enabled: false
  details: "العمل على مشروع رائع"
  state: "مشغول جداً"
  use_start_timestamp: false
  large_image_key: ""
  large_text: ""
  small_image_key: ""
  small_text: ""
  # أزرار مخصصة للتجاوز (حتى 2)
  buttons: []
  # معلومات الحفلة (Party)
  party_id: ""
  party_current: 0
  party_max: 0
